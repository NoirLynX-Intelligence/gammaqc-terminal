# gammaqc-mesh — single-template Nginx config for the 500-domain install mesh.
#
# Generated per-domain by scripts/render-configs.sh which expands:
#   {{DOMAIN}}     → full hostname (e.g. sec-earnings-cli.xyz)
#   {{NICHE_HOOK}} → niche-specific subhead (from domains.list col 2)
#
# Honest contract reminders enforced HERE (not just docs):
#   - No third-party analytics endpoint allowed
#   - Custom log format strips IP to /24 (Class-C bucket) for ops debug
#     only — never full client IPs
#   - Logs rotate daily, retained 7 days (logrotate config in
#     scripts/bootstrap.sh)
#   - Strict-Transport-Security forces HTTPS forever
#   - Content-Security-Policy 'default-src none' — nothing external

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # HTTP → HTTPS redirect, except for the ACME challenge path which
    # Let's Encrypt's certbot uses on port 80.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    # Per-domain cert paths (certbot-bulk.sh assigns these)
    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;

    # Modern TLS only — drop TLS 1.0/1.1 (deprecated since 2020)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Privacy headers — every response carries these:
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # CSP: default-src 'none' kills every external request the page could
    # try to make. The landing page is pure HTML + inline CSS (no JS at
    # all), so this is enforceable without breaking anything.
    add_header Content-Security-Policy "default-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;

    # Privacy-respecting log format (strip last octet of IPv4)
    set $client_subnet "";
    if ($remote_addr ~ "^(\d+\.\d+\.\d+)\.\d+$") {
        set $client_subnet "$1.0";
    }
    access_log /var/log/nginx/gammaqc-mesh.log mesh_privacy;
    error_log  /var/log/nginx/gammaqc-mesh.error.log warn;

    root /var/www/gammaqc-mesh/{{DOMAIN}};
    index index.html;

    # Landing page
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # The curl-pipe-bash target — explicit content-type so curl + bash
    # never get confused. NO-CACHE: install scripts must always be fresh
    # so we can ship hotfixes without waiting on CDN propagation.
    location = /install {
        types { } default_type "text/x-shellscript; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files /install =404;
    }

    # SBOM / version manifest — lets advanced users verify what they're
    # installing BEFORE they pipe it to bash. Honest invitation.
    location = /sbom {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
        try_files /sbom.json =404;
    }

    # Health endpoint for verify-mesh.sh smoke testing
    location = /healthz {
        types { } default_type "text/plain";
        return 200 "ok\n";
        access_log off;
    }

    # robots.txt — allow indexing of /, deny /install (we don't want
    # search engines surfacing raw bash scripts in their results)
    location = /robots.txt {
        types { } default_type "text/plain";
        return 200 "User-agent: *\nDisallow: /install\nAllow: /\n";
    }

    # Block every other path — no directory listing, no surprises
    location / {
        return 404;
    }
}
