# gammaqc-mesh PRE-CERT template (HTTP-only).
#
# Rendered per-domain BEFORE Let's Encrypt has issued a cert. Two jobs:
#   1. Serve the ACME challenge path on port 80 so certbot can validate
#      domain ownership and issue a cert.
#   2. Serve the landing page + /install + /sbom over HTTP so the mesh
#      is functional (degraded — no HTTPS) even before certs land.
#
# After certbot issues a cert, render-configs.sh re-renders THIS domain
# with the full HTTPS template (gammaqc-mesh.conf) which adds the 443
# server block + HTTP→HTTPS redirect.
#
# Same {{DOMAIN}} + {{NICHE_HOOK}} substitution as the full template.

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # ACME challenge — Let's Encrypt drops validation tokens here
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        access_log off;
    }

    # Privacy log format (already in the snippet)
    set $client_subnet "";
    if ($remote_addr ~ "^(\d+\.\d+\.\d+)\.\d+$") {
        set $client_subnet "$1.0";
    }
    access_log /var/log/nginx/gammaqc-mesh.log mesh_privacy;
    error_log  /var/log/nginx/gammaqc-mesh.error.log warn;

    # Privacy headers — same as HTTPS variant (without HSTS, which is a
    # https-only directive). CSP still locked down.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
    # Signal to caches + clients that this is the pre-cert phase
    add_header X-Gammaqc-Mesh "pre-cert" always;

    root /var/www/gammaqc-mesh/{{DOMAIN}};
    index index.html;

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /install {
        types { } default_type "text/x-shellscript; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files /install =404;
    }

    location = /sbom {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
        try_files /sbom.json =404;
    }

    location = /healthz {
        types { } default_type "text/plain";
        return 200 "ok\n";
        access_log off;
    }

    location = /robots.txt {
        types { } default_type "text/plain";
        return 200 "User-agent: *\nDisallow: /install\nAllow: /\n";
    }

    location / { return 404; }
}
