# Canonical install endpoint — POST-CERT (full HTTPS) template.
#
# Rendered for install.gammaqc.com AFTER Let's Encrypt has issued the cert.
# Adds the 443 server block + HTTP→HTTPS redirect + HSTS.

server {
    listen 80;
    listen [::]:80;
    server_name install.gammaqc.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name install.gammaqc.com;

    ssl_certificate     /etc/letsencrypt/live/install.gammaqc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/install.gammaqc.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
    add_header X-Gammaqc-Mesh "canonical" always;

    set $client_subnet "";
    if ($remote_addr ~ "^(\d+\.\d+\.\d+)\.\d+$") {
        set $client_subnet "$1.0";
    }
    access_log /var/log/nginx/gammaqc-mesh.log mesh_privacy;
    error_log  /var/log/nginx/gammaqc-mesh.error.log warn;

    root /var/www/gammaqc-mesh/install.gammaqc.com;
    index index.html;

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /install {
        types { } default_type "text/x-shellscript; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        try_files /install =404;
    }

    location = /sbom {
        types { } default_type "application/json; charset=utf-8";
        add_header Cache-Control "public, max-age=300";
        try_files /sbom.json =404;
    }

    location = /healthz {
        types { } default_type "text/plain";
        return 200 "ok\n";
        access_log off;
    }

    location = /robots.txt {
        types { } default_type "text/plain";
        return 200 "User-agent: *\nDisallow: /install\nAllow: /\n";
    }

    location / { return 404; }
}
