# default-redirect.conf — catches every Host header that doesn't match
# the canonical install.gammaqc.com server block.
#
# Role: the GammaQC slice of the numeric .xyz mesh (the 923 domains in
# the 1333xxx range — DrkLynX's 1334xxx / 1411xxx allocation stays
# under separate ownership and is NOT pointed at this box). When a
# request arrives with Host header like "1333077.xyz", this default
# server block catches it and 301-redirects to https://install.gammaqc.com,
# preserving the request path.
#
# That way the entire 1,500-node inventory is functional as alternate
# install URLs WITHOUT per-domain server blocks, per-domain certs, or
# per-domain landing pages. One config, one redirect, mesh online.
#
# default_server on listen :80 makes this the FALLBACK — it runs ONLY
# when no other server block's server_name matched the Host header.
# The canonical server_name install.gammaqc.com always wins for that
# specific host, so the redirect never fires on canonical traffic.
#
# We DO NOT serve HTTPS here. The mesh is HTTP-only redirects (which
# is fine — bash + curl follow 301s automatically; pip install fetches
# from PyPI over its own HTTPS; no secrets are transmitted at this
# layer). Phase C of the rollout layers Cloudflare or LE certs on the
# numeric domains if user volume warrants HTTPS at the mesh edge.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Always serve the ACME challenge — lets us issue LE certs for the
    # mesh nodes later via certbot-bulk.sh when ready.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        access_log off;
    }

    set $client_subnet "";
    if ($remote_addr ~ "^(\d+\.\d+\.\d+)\.\d+$") {
        set $client_subnet "$1.0";
    }
    access_log /var/log/nginx/gammaqc-mesh-redirect.log mesh_privacy;
    error_log  /var/log/nginx/gammaqc-mesh-redirect.error.log warn;

    # 301 (permanent) — search engines + curl + bash all follow it. The
    # PATH IS PRESERVED ($request_uri), so users hitting
    #   http://1334077.xyz/install
    # land at
    #   https://install.gammaqc.com/install
    # and get the byte-identical script.
    add_header X-Gammaqc-Mesh "redirect-fabric" always;
    return 301 https://install.gammaqc.com$request_uri;
}
