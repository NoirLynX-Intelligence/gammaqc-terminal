name: pytest

# Runs on every push + PR. Matrix across Python 3.10/3.11/3.12 + ubuntu/macos/windows
# so cross-platform issues (cp1252 encoding on Windows, asyncio loop policy on macos,
# etc.) surface in CI rather than in retail-quant install reports.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v --tb=short

      - name: Smoke-test CLI entrypoint
        # Confirms `gamma` is on PATH after install and the entrypoint resolves.
        # Doesn't hit network; just exercises argparse + module import.
        run: |
          gamma version
          gamma status
          gamma --help

  package-build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify distributions
        run: |
          pip install --quiet twine
          python -m twine check dist/*
      - name: Upload built distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 30
