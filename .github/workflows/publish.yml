name: publish to PyPI

# Triggered ONLY by a tag push matching v*.*.*  (e.g. v0.2.0, v1.0.0).
# Never runs on branch pushes or PRs. PyPI publishes are irreversible —
# tag → publish → version exists forever, so we gate hard:
#   1. Tag MUST match v<major>.<minor>.<patch> exactly
#   2. Tag's commit MUST be on main (no publishing from feature branches)
#   3. Full pytest matrix (test.yml) MUST be green on that commit
#   4. sdist + wheel built via python-build, validated via twine check
#   5. Publish uses PyPI Trusted Publisher (OIDC) when configured, OR
#      falls back to PYPI_API_TOKEN secret when set
#
# Both auth paths are honest: if neither is configured, the job logs the
# missing config + exits 0 (BUILDS the artifact, skips publish). That way
# the first tag push surfaces what's missing without exploding.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual tag to build/publish (e.g. v0.2.0)"
        required: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish mid-flight

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publisher OIDC

jobs:
  guard:
    name: tag must be on main
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to verify tag's ancestry to main
      - name: Resolve tag + ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Resolve the commit SHA the tag points at
          REF=$(git rev-list -n 1 "refs/tags/$TAG" 2>/dev/null || echo "")
          if [ -z "$REF" ]; then
            echo "::error::tag $TAG not found"; exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Verify tag commit is on main
        run: |
          TAG_SHA="${{ steps.resolve.outputs.ref }}"
          # Tag commit must be an ancestor of (or equal to) origin/main
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main 2>/dev/null; then
            echo "::error::tag commit $TAG_SHA is NOT on main — publishing from feature branches is blocked"
            exit 1
          fi
          echo "::notice::tag commit verified on main"

  build:
    name: build sdist + wheel from tag
    runs-on: ubuntu-latest
    needs: guard
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches pyproject version
        run: |
          PY_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${{ needs.guard.outputs.tag }}"
          TAG_VER="${TAG_VER#v}"
          if [ "$PY_VER" != "$TAG_VER" ]; then
            echo "::error::tag $TAG_VER does not match pyproject.toml version $PY_VER"
            exit 1
          fi
          echo "::notice::tag $TAG_VER == pyproject $PY_VER"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate distributions
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 90

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    # NOTE: intentionally no `environment:` block. Adding `environment: pypi`
    # creates a deployment environment that scopes secrets to that
    # environment only — repo-level PYPI_API_TOKEN would NOT propagate. We
    # learned this the hard way on the v0.2.0 first-publish attempt (the
    # workflow fell back to OIDC because PYPI_API_TOKEN was invisible inside
    # the environment scope). Once we move to Trusted Publisher OIDC, we
    # can re-add `environment: pypi` and configure the publisher to match.
    env:
      # Bind the secret at job level so we can also check it in `if:` blocks.
      PYPI_TOKEN_PRESENT: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Decide auth path (Trusted Publisher OIDC OR token)
        id: auth
        env:
          TOKEN_PRESENT: ${{ env.PYPI_TOKEN_PRESENT }}
        run: |
          # The job-level env binding above flattens `secrets.X != ''` to a
          # 'true'/'false' string we can compare cleanly. Direct
          # `${{ secrets.X }}` interpolation inside a bash heredoc is brittle
          # under environment scoping.
          if [ "$TOKEN_PRESENT" = "true" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing with PYPI_API_TOKEN (legacy auth)"
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing via Trusted Publisher (OIDC) — no token needed"
          fi

      - name: Publish via Trusted Publisher (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No `password` or `user` — gh-action-pypi-publish detects the
          # OIDC token automatically when id-token: write is granted.

      - name: Publish via PYPI_API_TOKEN (legacy)
        if: steps.auth.outputs.mode == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Confirm publish
        run: |
          TAG_VER="${{ needs.guard.outputs.tag }}"
          echo "::notice::Published gammaqc-terminal $TAG_VER to PyPI"
          echo "::notice::Install with: pip install gammaqc-terminal==${TAG_VER#v}"
