name: SPS Self-Tune (weekly outcome correlation)

# ═══════════════════════════════════════════════════════════════════════════════
# Self-learning loop for the Sovereign PR Sentinel.
#
# Runs weekly. For each merged PR in the last 30 days:
#   1. Pulls the sealed SPS verdict from artifacts
#   2. Correlates verdict findings with post-merge incidents:
#      - hotfixes (PRs with "hotfix:" or "fix:" or "revert" in title within 14d
#        of original merge, touching overlapping files)
#      - reverts (git revert commits referencing the merged SHA)
#      - prod-rollback events from any future monitoring webhook
#   3. Computes per-lens hit rate: of findings posted in category X, how many
#      correlated with a real incident? (false positives lower the weight,
#      true positives raise it)
#   4. Writes `.github/sps-weights.json` — the panel reads this on next run
#      and adjusts severity thresholds per lens (high-hit-rate lens stays
#      sensitive; low-hit-rate lens has its severities downgraded).
#
# This makes the reviewer SELF-IMPROVING. The same prompts that catch real
# bugs get amplified; the prompts that produce noise get dampened. No human
# tuning required.
#
# Honesty constraints:
#   - Never silently silences a lens (every adjustment logged + audit trail)
#   - Never raises a lens above its initial weight (the prompts are the
#     ceiling; learning only DAMPENS noise, doesn't invent new sensitivity)
#   - Audit JSON committed via the bot to a separate `sps-audit` branch
#     so the weight changes are themselves PR-reviewable
# ═══════════════════════════════════════════════════════════════════════════════

"on":
  schedule:
    - cron: '0 14 * * 1'   # Mondays at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  actions: read

jobs:
  self-tune:
    name: Correlate verdicts with post-merge incidents
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent merged PRs + incident signals
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json, os, subprocess, pathlib, sys
          from datetime import datetime, timezone, timedelta

          # Pull merged PRs in the last 30 days
          out = subprocess.run(
              ["gh", "pr", "list", "--state", "merged", "--limit", "200",
               "--json", "number,title,mergedAt,files"],
              capture_output=True, text=True, check=True,
          ).stdout
          all_prs = json.loads(out)
          cutoff = datetime.now(timezone.utc) - timedelta(days=30)
          recent = [
              p for p in all_prs
              if datetime.fromisoformat(p["mergedAt"].replace("Z", "+00:00")) >= cutoff
          ]
          print(f"Found {len(recent)} merged PRs in last 30 days")

          # Identify post-merge incidents: hotfixes / reverts in next 14d
          incidents_per_pr = {}   # pr_number -> [related_hotfix_titles]
          for pr in recent:
              merged_at = datetime.fromisoformat(pr["mergedAt"].replace("Z", "+00:00"))
              window_end = merged_at + timedelta(days=14)
              pr_files = set(f["path"] for f in pr.get("files", []))
              hits = []
              for other in all_prs:
                  if other["number"] == pr["number"]:
                      continue
                  other_merged = datetime.fromisoformat(other["mergedAt"].replace("Z", "+00:00"))
                  if not (merged_at < other_merged <= window_end):
                      continue
                  title = other["title"].lower()
                  if not any(k in title for k in ("hotfix", "fix:", "revert", "rollback", "patch:")):
                      continue
                  other_files = set(f["path"] for f in other.get("files", []))
                  if pr_files & other_files:
                      hits.append({"pr": other["number"], "title": other["title"]})
              if hits:
                  incidents_per_pr[pr["number"]] = hits

          print(f"Detected {len(incidents_per_pr)} PRs with post-merge incident correlations")
          pathlib.Path("recent_prs.json").write_text(json.dumps({
              "prs": recent, "incidents": incidents_per_pr,
          }, indent=2))
          PY

      - name: Compute per-lens hit rates from SPS artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json, os, subprocess, pathlib
          from datetime import datetime, timezone   # needed by v2.0.4 _parse_iso_utc helper

          data = json.loads(pathlib.Path("recent_prs.json").read_text())
          recent = data["prs"]
          incidents = data["incidents"]   # pr_number(str) -> [hotfixes]

          # For each recent PR, try to fetch its SPS verdict artifact
          per_lens = {}   # lens -> {findings_posted: N, correlated_with_incident: K}
          for pr in recent:
              pr_num = pr["number"]
              # Find the SPS workflow run for this PR
              try:
                  runs = subprocess.run(
                      ["gh", "run", "list",
                       "--workflow", "sovereign-pr-sentinel.yml",
                       "--branch", pr.get("headRefName", ""),
                       "--limit", "5", "--json", "databaseId,headSha,conclusion"],
                      capture_output=True, text=True, timeout=30,
                  ).stdout
                  runs = json.loads(runs) if runs.strip() else []
              except Exception:
                  runs = []
              if not runs:
                  continue
              # Use the latest successful run
              run = next((r for r in runs if r.get("conclusion") == "success"), runs[0])
              try:
                  subprocess.run(
                      ["gh", "run", "download", str(run["databaseId"]),
                       "--name", "sps-verdict-signed", "--dir", f"verdicts/pr{pr_num}"],
                      capture_output=True, timeout=30,
                  )
              except Exception:
                  continue
              vpath = pathlib.Path(f"verdicts/pr{pr_num}/verdict.json")
              if not vpath.exists():
                  continue
              verdict = json.loads(vpath.read_text())
              had_incident = str(pr_num) in incidents
              for f in verdict.get("findings", []):
                  lens = f.get("lens", "?")
                  per_lens.setdefault(lens, {"posted": 0, "correlated": 0})
                  per_lens[lens]["posted"] += 1
                  if had_incident:
                      per_lens[lens]["correlated"] += 1

          # Compute hit rate per lens. Bayesian smoothing — assume 30% prior with weight 5
          # (low N means we trust the prior; high N lets data dominate)
          PRIOR_RATE = 0.30
          PRIOR_WEIGHT = 5
          # ─── v2.0: Inline FP feedback loop ──────────────────────────────
          # Read recent PR comments for [SPS-FP:<lens>] tags from human
          # reviewers. Each tagged FP adds a "soft incident" against the lens.
          # SPS v2.0.2 self-caught LOW: dedup by comment timestamp so the same
          # FP tag isn't counted across multiple weekly cron runs. The 30-day
          # window catches a PR up to 4 times otherwise → 4x over-dampening.
          import re
          fp_pattern = re.compile(r"\[SPS-FP:([a-z_]+)\]", re.IGNORECASE)
          fp_per_lens = {}
          # Load last scan timestamp from prior weights (if any) so we only
          # count comments created AFTER the previous cron run completed.
          # Fail-open: if file missing/corrupted, count all comments (same
          # as v2.0.0 behavior — explicit degradation, not silent).
          # SPS v2.0.4 self-caught MEDIUM: parse timestamps as datetime objects
          # before comparison. Python isoformat() returns '+00:00' suffix while
          # GitHub API returns 'Z' suffix — string compare would mis-order them
          # and miscount FPs. Normalize via fromisoformat after replacing 'Z'.
          def _parse_iso_utc(s):
              """Best-effort parse of an ISO timestamp to UTC datetime. Returns
              None if unparseable (caller treats None as 'count this comment')."""
              if not s:
                  return None
              try:
                  return datetime.fromisoformat(s.replace("Z", "+00:00"))
              except (ValueError, AttributeError):
                  return None

          last_scan_iso = None
          last_scan_dt = None
          try:
              prior = json.loads(pathlib.Path(".github/sps-weights.json").read_text())
              last_scan_iso = prior.get("last_scan_at")
              last_scan_dt = _parse_iso_utc(last_scan_iso)
          except Exception:
              pass

          # ─── SPS v2.0.9: BATCHED gh API for FP-tag scan ────────────────
          # Round 6 + 9 flagged the prior `for pr in recent: gh pr view`
          # loop as O(N) — N subprocess.run calls, each ~1-3s GitHub round
          # trip, each consuming 1 of 1000/hour rate limit. A repo with 100
          # recent PRs burned 5+ minutes and 100 rate-limit tokens just to
          # find FP tags. Rewrite uses the `/repos/{owner}/{repo}/issues/
          # comments` paginated endpoint, which returns ALL PR + issue
          # comments in the repo (filtered by `since` server-side) in O(1)
          # paginated calls regardless of how many PRs are in window.
          #
          # Why issues/comments (not pulls/comments): GitHub treats PR
          # discussion comments as issue comments under the hood. PR review
          # comments (inline code comments) live at pulls/comments and use
          # a different endpoint — those aren't where SPS-FP tags are
          # posted (humans tag in the PR discussion thread).
          recent_pr_numbers = {pr["number"] for pr in recent}
          # `since` is a critical perf knob: server returns only comments
          # updated AFTER this timestamp, eliminating client-side dedup
          # work AND reducing payload size on repeat scans.
          since_param = []
          if last_scan_iso:
              # GitHub expects ISO-8601 with 'Z' suffix (not '+00:00')
              since_z = last_scan_iso.replace("+00:00", "Z")
              since_param = ["-f", f"since={since_z}"]

          try:
              repo_slug = os.environ.get("GITHUB_REPOSITORY", "")
              if not repo_slug:
                  raise RuntimeError("GITHUB_REPOSITORY env var missing")
              gh_result = subprocess.run(
                  ["gh", "api", "--paginate",
                   f"/repos/{repo_slug}/issues/comments",
                   "-f", "per_page=100",
                   "-f", "sort=created",
                   "-f", "direction=desc",
                   *since_param],
                  capture_output=True, text=True, timeout=120,
              )
              if gh_result.returncode != 0:
                  print(f"::warning::Batched gh api failed (exit {gh_result.returncode}): "
                        f"{(gh_result.stderr or '')[:200]}")
                  comments_raw = "[]"
              else:
                  comments_raw = gh_result.stdout or "[]"
          except subprocess.TimeoutExpired:
              print("::warning::Batched gh api timed out after 120s")
              comments_raw = "[]"
          except Exception as e:
              print(f"::warning::Batched gh api errored: {e}")
              comments_raw = "[]"

          # `gh api --paginate` concatenates JSON arrays from each page
          # by replacing `][` with `,` internally — output is a single
          # JSON array. Defensively handle both single-array and the
          # legacy line-delimited format.
          try:
              all_comments = json.loads(comments_raw)
              if not isinstance(all_comments, list):
                  all_comments = []
          except json.JSONDecodeError:
              # Fall back to one-object-per-line parse (older gh CLI)
              all_comments = []
              for line in comments_raw.splitlines():
                  if not line.strip():
                      continue
                  try:
                      all_comments.append(json.loads(line))
                  except json.JSONDecodeError:
                      continue

          # Group by PR number, filtered to only `recent` PRs. The
          # issue_url ends in `/issues/{number}` for both issues AND PRs.
          for cmt in all_comments:
              issue_url = cmt.get("issue_url", "")
              try:
                  pr_num_from_url = int(issue_url.rsplit("/", 1)[-1])
              except (ValueError, IndexError):
                  continue
              if pr_num_from_url not in recent_pr_numbers:
                  continue
              # Datetime-aware dedup belt-and-suspenders (server `since` is
              # the primary filter; this catches edge cases where `since`
              # was unset, e.g. first run after weights file deletion).
              cmt_dt = _parse_iso_utc(cmt.get("created_at"))
              if last_scan_dt and cmt_dt and cmt_dt <= last_scan_dt:
                  continue
              for match in fp_pattern.finditer(cmt.get("body", "") or ""):
                  lens_name = match.group(1).lower()
                  fp_per_lens[lens_name] = fp_per_lens.get(lens_name, 0) + 1

          print(f"Inline FP tags found (since {last_scan_iso or 'genesis'}, "
                f"{len(all_comments)} comments scanned in 1 paginated call): {fp_per_lens}")

          # FP-INCIDENT_RATIO: 3 inline FPs equate to 1 real prod incident in
          # the dampening math. Tunable; conservative on purpose (inline FPs
          # are author-reported and can be partisan).
          FP_INCIDENT_RATIO = 3

          weights = {}
          for lens, counts in per_lens.items():
              posted = counts["posted"]
              correlated = counts["correlated"]
              inline_fps = fp_per_lens.get(lens, 0)
              # Treat inline FPs as ANTI-correlation events (lower posterior)
              # by adding them to "posted" without adding to "correlated"
              adj_posted = posted + (inline_fps / FP_INCIDENT_RATIO)
              posterior = (correlated + PRIOR_RATE * PRIOR_WEIGHT) / max(1, adj_posted + PRIOR_WEIGHT)
              weights[lens] = {
                  "posted": posted,
                  "correlated_with_incident": correlated,
                  "inline_fps_tagged": inline_fps,
                  "posterior_hit_rate": round(posterior, 3),
                  # severity_multiplier modulates dampening. Hit rate < 0.20
                  # means lens is mostly noise; downgrade aggressively.
                  "severity_multiplier": 1.0 if posterior >= 0.50 else (0.7 if posterior >= 0.20 else 0.4),
              }

          # Pad with default weight for any lens that didn't appear
          for lens in ("security", "logic", "performance", "edge_case",
                       "payments", "data_deletion", "attestation"):
              if lens not in weights:
                  weights[lens] = {"posted": 0, "correlated_with_incident": 0,
                                   "posterior_hit_rate": PRIOR_RATE,
                                   "severity_multiplier": 1.0}

          from datetime import datetime, timezone
          now_iso = datetime.now(timezone.utc).isoformat()
          state = {
              "computed_at": now_iso,
              # v2.0.2: persist last_scan_at so the NEXT cron run only counts
              # FP-tag comments created AFTER this scan completed. Closes the
              # SPS-self-caught LOW "FP-tag double-counting" finding.
              "last_scan_at": now_iso,
              "window_days": 30,
              "prs_analyzed": len(recent),
              "sps_version": "v2.0.2",
              "weights": weights,
              "fp_tags_scanned": sum(fp_per_lens.values()),
              "fp_incident_ratio": FP_INCIDENT_RATIO,
              "notes": [
                  "severity_multiplier of 1.0 = no change",
                  "0.7 = downgrade CRITICAL→HIGH, HIGH→MEDIUM, etc.",
                  "0.4 = aggressive downgrade (lens is mostly noise)",
                  "Multipliers NEVER raise severity above the sentinel's original verdict.",
                  "v2.0: inline [SPS-FP:<lens>] PR comments count as anti-correlation",
                  f"v2.0: {FP_INCIDENT_RATIO} inline FPs ≈ 1 real post-merge incident",
              ],
          }
          pathlib.Path(".github/sps-weights.json").write_text(json.dumps(state, indent=2))
          print(json.dumps(state, indent=2))
          PY

      - name: Commit weights to sps-audit branch (audit trail)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "sps-self-tune-bot"
          git config user.email "sps-bot@noreply.gammaqc.com"
          # Create or update the sps-audit branch (separate from main; never modifies main)
          git checkout -B sps-audit
          git add .github/sps-weights.json
          if git diff --cached --quiet; then
            echo "No weight changes this week."
          else
            git commit -m "sps-self-tune: weekly weight refresh ($(date -u +%Y-%m-%d))"
            git push --force-with-lease origin sps-audit
            echo "Weights committed to sps-audit branch."
          fi
